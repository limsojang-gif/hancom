<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계산기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    font-family: 'Segoe UI', sans-serif;
  }
  .calculator {
    background: #1c1c1e;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    width: 320px;
  }
  .display {
    background: #000;
    color: #fff;
    font-size: 2.5rem;
    text-align: right;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 16px;
    min-height: 80px;
    word-break: break-all;
    overflow-wrap: break-word;
  }
  .display .history {
    font-size: 1rem;
    color: #888;
    min-height: 20px;
  }
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  button {
    border: none;
    border-radius: 50%;
    height: 64px;
    font-size: 1.5rem;
    cursor: pointer;
    color: #fff;
    background: #333;
    transition: filter 0.15s;
  }
  button:hover { filter: brightness(1.2); }
  button:active { filter: brightness(0.8); }
  .op { background: #ff9500; }
  .fn { background: #a5a5a5; color: #000; }
  .zero { grid-column: span 2; border-radius: 32px; }
</style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="history" id="history"></div>
      <div id="result">0</div>
    </div>
    <div class="buttons">
      <button class="fn" data-action="clear">AC</button>
      <button class="fn" data-action="sign">+/-</button>
      <button class="fn" data-action="percent">%</button>
      <button class="op" data-op="/">÷</button>

      <button data-num="7">7</button>
      <button data-num="8">8</button>
      <button data-num="9">9</button>
      <button class="op" data-op="*">×</button>

      <button data-num="4">4</button>
      <button data-num="5">5</button>
      <button data-num="6">6</button>
      <button class="op" data-op="-">−</button>

      <button data-num="1">1</button>
      <button data-num="2">2</button>
      <button data-num="3">3</button>
      <button class="op" data-op="+">+</button>

      <button class="zero" data-num="0">0</button>
      <button data-num=".">.</button>
      <button class="op" data-action="equals">=</button>
    </div>
  </div>

<script>
  const resultEl = document.getElementById('result');
  const historyEl = document.getElementById('history');

  let current = '0';
  let previous = null;
  let operator = null;
  let resetNext = false;

  function updateDisplay() {
    resultEl.textContent = current;
    historyEl.textContent =
      previous !== null && operator
        ? `${previous} ${symbol(operator)}`
        : '';
  }

  function symbol(op) {
    return { '/': '÷', '*': '×', '-': '−', '+': '+' }[op] || op;
  }

  function inputNumber(n) {
    if (resetNext) { current = '0'; resetNext = false; }
    if (n === '.') {
      if (!current.includes('.')) current += '.';
    } else {
      current = current === '0' ? n : current + n;
    }
    updateDisplay();
  }

  function calculate(a, b, op) {
    a = parseFloat(a); b = parseFloat(b);
    switch (op) {
      case '+': return a + b;
      case '-': return a - b;
      case '*': return a * b;
      case '/': return b === 0 ? 'Error' : a / b;
    }
  }

  function chooseOperator(op) {
    if (operator && !resetNext) {
      const res = calculate(previous, current, operator);
      current = String(res);
      previous = res === 'Error' ? null : String(res);
    } else {
      previous = current;
    }
    operator = op;
    resetNext = true;
    updateDisplay();
  }

  function equals() {
    if (operator === null || previous === null) return;
    const res = calculate(previous, current, operator);
    current = String(res);
    previous = null;
    operator = null;
    resetNext = true;
    updateDisplay();
  }

  function clearAll() {
    current = '0'; previous = null; operator = null; resetNext = false;
    updateDisplay();
  }

  document.querySelector('.buttons').addEventListener('click', (e) => {
    const t = e.target;
    if (t.dataset.num !== undefined) inputNumber(t.dataset.num);
    else if (t.dataset.op) chooseOperator(t.dataset.op);
    else if (t.dataset.action === 'equals') equals();
    else if (t.dataset.action === 'clear') clearAll();
    else if (t.dataset.action === 'sign') {
      current = String(parseFloat(current) * -1);
      updateDisplay();
    } else if (t.dataset.action === 'percent') {
      current = String(parseFloat(current) / 100);
      updateDisplay();
    }
  });

  // 키보드 지원
  document.addEventListener('keydown', (e) => {
    if (e.key >= '0' && e.key <= '9') inputNumber(e.key);
    else if (e.key === '.') inputNumber('.');
    else if (['+', '-', '*', '/'].includes(e.key)) chooseOperator(e.key);
    else if (e.key === 'Enter' || e.key === '=') equals();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      current = current.length > 1 ? current.slice(0, -1) : '0';
      updateDisplay();
    }
  });

  updateDisplay();
</script>
</body>
</html>
