<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가산기 — Adding Machine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2432;
    --steel:#3A4756;
    --steel-2:#2C3746;
    --paper:#F2EFE6;
    --key:#E8E4D8;
    --key-edge:#CFC9B8;
    --vermilion:#E64A19;
    --amber:#D9A441;
    --tape-line:#D9D3C4;
    --readout-bg:#141B26;
    --readout-glow:#CFE3D6;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --grotesk:'Space Grotesk',system-ui,sans-serif;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{height:100%}

  body{
    font-family:var(--grotesk);
    background:
      radial-gradient(120% 90% at 50% -10%, #263140 0%, var(--ink) 55%, #10161F 100%);
    color:var(--paper);
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:clamp(16px,4vw,56px);
    -webkit-font-smoothing:antialiased;
  }

  .machine{
    width:100%;
    max-width:920px;
  }

  /* ---- nameplate / header ---- */
  .plate{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:16px;
    margin-bottom:22px;
    flex-wrap:wrap;
  }
  .plate h1{
    font-family:var(--grotesk);
    font-weight:600;
    font-size:clamp(1.3rem,3.4vw,2rem);
    letter-spacing:-0.01em;
  }
  .plate h1 span{color:var(--amber)}
  .eyebrow{
    font-family:var(--mono);
    font-size:0.66rem;
    letter-spacing:0.42em;
    text-transform:uppercase;
    color:#8A97A8;
    padding:6px 12px;
    border:1px solid #3B4757;
    border-radius:2px;
    white-space:nowrap;
  }

  /* ---- body: two columns ---- */
  .deck{
    display:grid;
    grid-template-columns:minmax(0,1.15fr) minmax(0,0.85fr);
    gap:clamp(16px,2.4vw,28px);
    align-items:stretch;
  }

  /* ---- calculator unit ---- */
  .unit{
    background:linear-gradient(180deg,var(--steel) 0%,var(--steel-2) 100%);
    border-radius:16px;
    padding:clamp(16px,2.2vw,24px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.10),
      inset 0 -2px 6px rgba(0,0,0,.35),
      0 22px 40px -18px rgba(0,0,0,.7);
    border:1px solid #45525F;
  }

  .readout{
    background:var(--readout-bg);
    border-radius:9px;
    padding:20px 22px;
    margin-bottom:clamp(14px,2vw,20px);
    box-shadow:inset 0 2px 10px rgba(0,0,0,.6);
    border:1px solid #0B0F16;
    min-height:104px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    overflow:hidden;
  }
  .readout .pending{
    font-family:var(--mono);
    font-weight:500;
    font-size:0.8rem;
    letter-spacing:0.08em;
    color:#6E8B78;
    min-height:1.1em;
    text-align:right;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .readout .value{
    font-family:var(--mono);
    font-weight:700;
    font-size:clamp(2.2rem,7vw,3.2rem);
    line-height:1;
    letter-spacing:0.01em;
    color:var(--readout-glow);
    text-align:right;
    font-variant-numeric:tabular-nums;
    text-shadow:0 0 14px rgba(150,200,168,.35);
    overflow:hidden;
    text-overflow:clip;
    white-space:nowrap;
  }
  .readout.error .value{
    color:var(--vermilion);
    font-size:clamp(1rem,3.4vw,1.35rem);
    text-shadow:none;
    letter-spacing:0.02em;
  }

  /* ---- keys ---- */
  .keys{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:clamp(8px,1.3vw,12px);
  }
  .key{
    font-family:var(--mono);
    font-weight:600;
    font-size:clamp(1rem,2.4vw,1.35rem);
    color:var(--ink);
    background:linear-gradient(180deg,#F3EFE4 0%,var(--key) 100%);
    border:1px solid var(--key-edge);
    border-radius:9px;
    padding:0;
    height:clamp(52px,8vw,64px);
    cursor:pointer;
    box-shadow:0 3px 0 var(--key-edge),0 5px 8px rgba(0,0,0,.25);
    transition:transform .05s ease,box-shadow .05s ease;
    user-select:none;
  }
  .key:active,.key.hit{
    transform:translateY(3px);
    box-shadow:0 0 0 var(--key-edge),0 2px 5px rgba(0,0,0,.3);
  }
  .key:focus-visible{
    outline:3px solid var(--amber);
    outline-offset:2px;
  }
  .key.op{
    background:linear-gradient(180deg,#48566A 0%,#3A4657 100%);
    color:var(--paper);
    border-color:#2C3746;
    box-shadow:0 3px 0 #26303C,0 5px 8px rgba(0,0,0,.3);
  }
  .key.op:active,.key.op.hit{box-shadow:0 0 0 #26303C,0 2px 5px rgba(0,0,0,.3)}
  .key.util{
    font-size:clamp(.78rem,1.9vw,.95rem);
    letter-spacing:.03em;
    background:linear-gradient(180deg,#EDE9DD 0%,#DED9CB 100%);
    color:var(--steel-2);
  }
  .key.equals{
    background:linear-gradient(180deg,#F0562A 0%,var(--vermilion) 100%);
    color:#fff;
    border-color:#B93A12;
    box-shadow:0 3px 0 #A8330F,0 5px 10px rgba(230,74,25,.35);
  }
  .key.equals:active,.key.equals.hit{box-shadow:0 0 0 #A8330F,0 2px 6px rgba(230,74,25,.4)}
  .key.wide{grid-column:span 2}

  /* ---- paper tape ---- */
  .tape-wrap{
    display:flex;
    flex-direction:column;
    background:var(--paper);
    border-radius:14px 14px 8px 8px;
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,.06),
      0 22px 40px -20px rgba(0,0,0,.6);
    overflow:hidden;
    min-height:0;
    position:relative;
  }
  .tape-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 18px 10px;
    border-bottom:1px dashed var(--tape-line);
  }
  .tape-head .label{
    font-family:var(--mono);
    font-size:.64rem;
    letter-spacing:.34em;
    text-transform:uppercase;
    color:#9A9584;
  }
  .tape-clear{
    font-family:var(--mono);
    font-size:.7rem;
    color:var(--vermilion);
    background:none;
    border:none;
    cursor:pointer;
    padding:4px 6px;
    border-radius:4px;
    letter-spacing:.02em;
  }
  .tape-clear:hover{text-decoration:underline}
  .tape-clear:focus-visible{outline:2px solid var(--amber);outline-offset:2px}

  .tape{
    list-style:none;
    flex:1;
    overflow-y:auto;
    padding:12px 18px 20px;
    font-family:var(--mono);
    font-size:.92rem;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    gap:2px;
    scroll-behavior:smooth;
    /* faint ledger lines */
    background-image:repeating-linear-gradient(transparent 0 27px,var(--tape-line) 27px 28px);
    background-attachment:local;
  }
  .tape li{
    display:flex;
    justify-content:space-between;
    gap:12px;
    line-height:28px;
    white-space:nowrap;
    animation:print .18s ease-out;
  }
  .tape li .sym{color:#B0AB98;font-weight:500}
  .tape li .num{font-variant-numeric:tabular-nums}
  .tape li.total{
    font-weight:700;
    border-top:1px solid var(--ink);
    margin-top:2px;
    color:var(--ink);
  }
  .tape li.total .num{color:var(--vermilion)}
  .tape li.note{color:var(--vermilion);font-size:.82rem;justify-content:flex-start}
  .tape .empty{
    color:#B4AF9E;
    font-size:.82rem;
    line-height:1.5;
    animation:none;
  }

  @keyframes print{
    from{transform:translateY(10px);opacity:0}
    to{transform:translateY(0);opacity:1}
  }

  .foot{
    margin-top:18px;
    font-family:var(--mono);
    font-size:.66rem;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:#68758A;
    text-align:center;
  }
  .foot kbd{
    font-family:var(--mono);
    background:#2C3746;
    border:1px solid #45525F;
    border-radius:3px;
    padding:1px 5px;
    color:#B7C2D0;
    letter-spacing:0;
  }

  @media (max-width:720px){
    .deck{grid-template-columns:1fr}
    .tape-wrap{min-height:220px;max-height:320px}
  }

  @media (prefers-reduced-motion:reduce){
    .key,.tape li{transition:none;animation:none}
    .tape{scroll-behavior:auto}
  }
</style>
</head>
<body>
  <main class="machine">
    <header class="plate">
      <h1>가산기<span>.</span> <span style="color:var(--paper);font-weight:400;font-size:.8em;">Adding&nbsp;Machine</span></h1>
      <span class="eyebrow">Model AM-01 · Ledger</span>
    </header>

    <div class="deck">
      <!-- calculator unit -->
      <section class="unit" aria-label="계산기">
        <div class="readout" id="readout">
          <div class="pending" id="pending" aria-hidden="true"></div>
          <div class="value" id="display" role="status" aria-live="polite">0</div>
        </div>
        <div class="keys" id="keys">
          <button class="key util" data-action="all-clear">C</button>
          <button class="key util" data-action="clear-entry">CE</button>
          <button class="key util" data-action="sign">±</button>
          <button class="key op" data-op="÷">÷</button>

          <button class="key" data-num="7">7</button>
          <button class="key" data-num="8">8</button>
          <button class="key" data-num="9">9</button>
          <button class="key op" data-op="×">×</button>

          <button class="key" data-num="4">4</button>
          <button class="key" data-num="5">5</button>
          <button class="key" data-num="6">6</button>
          <button class="key op" data-op="−">−</button>

          <button class="key" data-num="1">1</button>
          <button class="key" data-num="2">2</button>
          <button class="key" data-num="3">3</button>
          <button class="key op" data-op="+">+</button>

          <button class="key wide" data-num="0">0</button>
          <button class="key" data-action="decimal">.</button>
          <button class="key util" data-action="percent">%</button>
        </div>
        <button class="key equals" data-action="equals" style="width:100%;margin-top:12px;height:56px;">=</button>
      </section>

      <!-- paper tape -->
      <aside class="tape-wrap" aria-label="계산 테이프">
        <div class="tape-head">
          <span class="label">Tape</span>
          <button class="tape-clear" id="tapeClear">테이프 지우기</button>
        </div>
        <ul class="tape" id="tape">
          <li class="empty">여기에 모든 계산이<br>영수증처럼 인쇄됩니다.<br>숫자를 눌러 시작하세요.</li>
        </ul>
      </aside>
    </div>

    <p class="foot">키보드 지원 · <kbd>0–9</kbd> <kbd>+</kbd> <kbd>−</kbd> <kbd>×</kbd> <kbd>÷</kbd> <kbd>Enter</kbd>= <kbd>Esc</kbd>C <kbd>⌫</kbd></p>
  </main>

<script>
(function(){
  const displayEl = document.getElementById('display');
  const pendingEl = document.getElementById('pending');
  const readoutEl = document.getElementById('readout');
  const tapeEl    = document.getElementById('tape');
  const keysEl    = document.getElementById('keys');

  const OPS = {'+':(a,b)=>a+b,'−':(a,b)=>a-b,'×':(a,b)=>a*b,'÷':(a,b)=>a/b};

  let current = '0';     // string being typed
  let accumulator = null; // number carried from previous op
  let pendingOp = null;   // '+', '−', ...
  let justEvaluated = false; // last action produced a result
  let freshEntry = true;  // next digit starts a new number
  let errored = false;
  let tapeEmpty = true;

  function fmt(n){
    if(!isFinite(n)) return '∞';
    // avoid scientific-looking mess; keep sensible precision
    let s = Math.abs(n) < 1e-12 ? '0' : parseFloat(n.toPrecision(12)).toString();
    if(s.includes('e')) return n.toExponential(6);
    const [int, dec] = s.split('.');
    const grouped = int.replace('-','').replace(/\B(?=(\d{3})+(?!\d))/g,',');
    return (int.startsWith('-')?'-':'') + grouped + (dec!==undefined ? '.'+dec : '');
  }

  function render(){
    displayEl.textContent = errored ? current : fmt(parseFloat(current));
    if(errored){
      readoutEl.classList.add('error');
      displayEl.textContent = current;
    }else{
      readoutEl.classList.remove('error');
    }
    pendingEl.textContent = (!errored && pendingOp && accumulator!==null)
      ? fmt(accumulator) + ' ' + pendingOp : '';
  }

  function clearEmptyNote(){
    if(tapeEmpty){ tapeEl.innerHTML=''; tapeEmpty=false; }
  }

  function printLine(sym, num, cls){
    clearEmptyNote();
    const li = document.createElement('li');
    if(cls) li.className = cls;
    if(cls==='note'){
      li.textContent = num;
    }else{
      const s = document.createElement('span'); s.className='sym'; s.textContent = sym||'';
      const n = document.createElement('span'); n.className='num'; n.textContent = num;
      li.append(s,n);
    }
    tapeEl.appendChild(li);
    tapeEl.scrollTop = tapeEl.scrollHeight;
  }

  // ---- input handlers ----
  function inputDigit(d){
    if(errored) reset();
    if(justEvaluated){ current='0'; justEvaluated=false; freshEntry=true; }
    if(freshEntry){ current = (d==='0') ? '0' : d; freshEntry=false; }
    else{ current = (current==='0') ? d : current + d; }
    render();
  }

  function inputDecimal(){
    if(errored) reset();
    if(justEvaluated){ current='0'; justEvaluated=false; freshEntry=false; }
    if(freshEntry){ current='0.'; freshEntry=false; render(); return; }
    if(!current.includes('.')) current += '.';
    render();
  }

  function toggleSign(){
    if(errored) return;
    if(current==='0') return;
    current = current.startsWith('-') ? current.slice(1) : '-'+current;
    render();
  }

  function percent(){
    if(errored) return;
    let val = parseFloat(current);
    val = (accumulator!==null && pendingOp) ? accumulator * (val/100) : val/100;
    current = String(val);
    justEvaluated = false; freshEntry = false;
    render();
  }

  function chooseOp(op){
    if(errored) reset();
    const val = parseFloat(current);
    if(pendingOp && !freshEntry && !justEvaluated){
      // chain: compute intermediate
      const res = compute(accumulator, val, pendingOp);
      if(res===null) return;
      printLine(op, fmt(val), null);
      accumulator = res;
    }else if(pendingOp && justEvaluated){
      accumulator = val;
    }else{
      accumulator = val;
      printLine(op, fmt(val), null);
    }
    pendingOp = op;
    freshEntry = true;
    justEvaluated = false;
    render();
  }

  function compute(a,b,op){
    if(op==='÷' && b===0){
      errored = true; current = '— 0으로 나눌 수 없어요 —';
      printLine('', '0으로 나눌 수 없어요', 'note');
      render();
      return null;
    }
    return OPS[op](a,b);
  }

  function equals(){
    if(errored){ reset(); return; }
    if(pendingOp===null){
      return; // nothing to resolve
    }
    const val = parseFloat(current);
    printLine('=', fmt(val), null);
    const res = compute(accumulator, val, pendingOp);
    if(res===null) return;
    printLine('', fmt(res), 'total');
    current = String(res);
    accumulator = null;
    pendingOp = null;
    justEvaluated = true;
    freshEntry = true;
    render();
  }

  function clearEntry(){
    if(errored){ reset(); return; }
    current = '0';
    freshEntry = true;
    justEvaluated = false;
    render();
  }

  function reset(){
    current='0'; accumulator=null; pendingOp=null;
    justEvaluated=false; freshEntry=true; errored=false;
    render();
  }

  function allClear(){ reset(); }

  function clearTape(){
    tapeEl.innerHTML = '<li class="empty">테이프를 비웠습니다.<br>새 계산을 시작하세요.</li>';
    tapeEmpty = true;
  }

  // ---- events ----
  keysEl.addEventListener('click', handleTarget);
  document.querySelector('.key.equals').addEventListener('click', handleTarget);
  document.getElementById('tapeClear').addEventListener('click', clearTape);

  function handleTarget(e){
    const btn = e.target.closest('button');
    if(!btn) return;
    act(btn);
  }

  function act(btn){
    if(btn.dataset.num!==undefined) inputDigit(btn.dataset.num);
    else if(btn.dataset.op!==undefined) chooseOp(btn.dataset.op);
    else switch(btn.dataset.action){
      case 'decimal': inputDecimal(); break;
      case 'sign': toggleSign(); break;
      case 'percent': percent(); break;
      case 'equals': equals(); break;
      case 'clear-entry': clearEntry(); break;
      case 'all-clear': allClear(); break;
    }
  }

  // keyboard
  const KEYMAP = {'*':'×','x':'×','X':'×','/':'÷','-':'−','+':'+'};
  document.addEventListener('keydown', (e)=>{
    let selector = null;
    if(/^[0-9]$/.test(e.key)) selector = `[data-num="${e.key}"]`;
    else if(e.key in KEYMAP) selector = `[data-op="${KEYMAP[e.key]}"]`;
    else if(e.key==='.') selector = '[data-action="decimal"]';
    else if(e.key==='Enter' || e.key==='='){ e.preventDefault(); selector='[data-action="equals"]'; }
    else if(e.key==='Escape') selector='[data-action="all-clear"]';
    else if(e.key==='%') selector='[data-action="percent"]';
    else if(e.key==='Backspace'){ e.preventDefault(); backspace(); return; }
    if(!selector) return;
    const btn = document.querySelector(selector);
    if(btn){ flash(btn); act(btn); }
  });

  function backspace(){
    if(errored){ reset(); return; }
    if(justEvaluated || freshEntry){ return; }
    current = current.length<=1 || (current.length===2 && current.startsWith('-'))
      ? '0' : current.slice(0,-1);
    if(current==='' || current==='-') current='0';
    render();
  }

  function flash(btn){
    btn.classList.add('hit');
    setTimeout(()=>btn.classList.remove('hit'),90);
  }

  render();
})();
</script>
</body>
</html>
