<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리 반 배치도</title>
  <link rel="stylesheet" href="index_10.css">
</head>

<body>
  <main>
    <section class="panel">
      <h1>우리 반 배치도</h1>
      <p class="summary">우리 반 명단 20명 · 이름을 클릭하면 수정할 수 있습니다.</p>

      <button id="reloadButton" type="button"
        aria-label="서버 명단 다시 불러오기"
        title="서버 명단 다시 불러오기">↻</button>

      <div class="toolbar">
        <input id="newName" type="text" placeholder="추가할 학생 이름">
        <button id="addButton" type="button">학생 추가</button>
        <button id="cleanButton" type="button">명단 한 번에 정리</button>
      </div>

      <p id="status">학생 데이터를 불러오는 중입니다.</p>
    </section>

    <section class="panel">
      <div class="teacher-desk">교탁</div>
      <div id="classroom"></div>
    </section>

    <section id="missingSection" class="panel">
      <h2>누락 명단 (<span id="missingCount">0</span>명)</h2>
      <p>우리 반 정상 명단에는 있지만 서버에는 없는 학생입니다.</p>
      <div id="missingStudents"></div>
    </section>

    <section id="extraSection" class="panel">
      <h2>정리 대상</h2>
      <p>우리 반 명단에 없거나 중복된 데이터입니다.</p>
      <div id="extras"></div>
    </section>

    <footer class="attribution">
      Pictograms:
      <a href="https://www.flaticon.com/free-icon/classroom_1233866"
        target="_blank" rel="noreferrer">Classroom</a>,
      <a href="https://www.flaticon.com/free-icon/user_1077114"
        target="_blank" rel="noreferrer">User</a>,
      <a href="https://www.flaticon.com/free-icon/delete_1214428"
        target="_blank" rel="noreferrer">Delete</a>
      from <a href="https://www.flaticon.com" target="_blank"
        rel="noreferrer">Flaticon</a>
    </footer>
  </main>

  <script>
    const API = "http://192.168.10.28:5000/hancom/임소정/users"

    const NORMAL_NAMES = [
      "강성원", "강하영", "김정아", "김정현",
      "김해냄", "김효인", "박진", "안치호",
      "양하은", "유민성", "이도연", "이현우",
      "임소정", "전욱진", "정기준", "정선민",
      "정유진", "표후동", "한유진", "한윤지"
    ]

    const AUTH_HEADERS = {
      Authorization: "HANCOM"
    }

    const JSON_HEADERS = {
      Authorization: "HANCOM",
      "Content-Type": "application/json"
    }

    // 처음 20명은 이 위치에 배치하고, 21~24번째 학생은 빈자리에 표시합니다.
    const NORMAL_SEAT_SLOTS = [
      1, 2, 3, 4,
      6, 7, 8, 9, 10, 11,
      12, 13, 14, 16, 17,
      19, 20, 21, 22, 23
    ]

    const EXTRA_SEAT_SLOTS = [0, 5, 15, 18]

    // 실제 우리 반 기본 자리 순서입니다.
    // 2, 3, 4, 5, 7, 8, 9, 10, 11, 12,
    // 13, 14, 15, 17, 18, 20, 21, 22, 23, 24번 자리에 대응합니다.
    const DEFAULT_SEAT_NAMES = [
      "한유진", "한윤지", "김정아", "김정현",
      "이도연", "강하영", "정유진", "김해냄", "정기준", "표후동",
      "정선민", "양하은", "유민성", "전욱진", "이현우",
      "박진", "김효인", "강성원", "임소정", "안치호"
    ]

    const classroom = document.querySelector("#classroom")
    const missingSection = document.querySelector("#missingSection")
    const missingStudentsBox = document.querySelector("#missingStudents")
    const missingCount = document.querySelector("#missingCount")
    const extrasBox = document.querySelector("#extras")
    const extraSection = document.querySelector("#extraSection")
    const statusBox = document.querySelector("#status")
    const newNameInput = document.querySelector("#newName")
    const addButton = document.querySelector("#addButton")
    const cleanButton = document.querySelector("#cleanButton")
    const reloadButton = document.querySelector("#reloadButton")

    let currentStudents = []

    function showStatus(message, isError = false) {
      statusBox.textContent = message
      statusBox.style.color = isError ? "#bd2530" : "#4a5a72"
    }

    async function readJson(response) {
      const text = await response.text()
      const data = text ? JSON.parse(text) : null

      if (!response.ok) {
        throw new Error(data?.error || `서버 오류 ${response.status}`)
      }

      return data
    }

    function compareStudents(students) {
      const seenNames = new Set()
      const extras = []

      students.forEach(student => {
        const name = String(student.name || "").trim()

        if (!NORMAL_NAMES.includes(name) || seenNames.has(name)) {
          extras.push(student)
        } else {
          seenNames.add(name)
        }
      })

      const missingNames = NORMAL_NAMES.filter(name => !seenNames.has(name))
      return { extras, missingNames }
    }

    function findDuplicateIds(students) {
      const counts = new Map()

      students.forEach(student => {
        const id = String(student.id)
        counts.set(id, (counts.get(id) || 0) + 1)
      })

      return [...counts.entries()]
        .filter(([, count]) => count > 1)
        .map(([id]) => id)
    }

    function makeDeleteButton(student) {
      const button = document.createElement("button")
      button.type = "button"
      button.className = "danger"
      button.textContent = "삭제"
      button.addEventListener("click", () => deleteStudent(student, button))
      return button
    }

    function setGridPosition(element, slotIndex) {
      const row = Math.floor(slotIndex / 6) + 1
      const positionInRow = slotIndex % 6
      const column = positionInRow < 3
        ? positionInRow + 1
        : positionInRow + 2

      element.style.gridRow = row
      element.style.gridColumn = column
    }

    function createStudentSeat(student, slotIndex, isExtra) {
      const seat = document.createElement("article")
      seat.className = isExtra ? "seat extra-seat" : "seat"
      setGridPosition(seat, slotIndex)

      const number = document.createElement("span")
      number.className = "seat-number"
      number.textContent = isExtra
        ? `${slotIndex + 1}번 자리 · 정리 대상`
        : `${slotIndex + 1}번 자리`

      const nameButton = document.createElement("button")
      nameButton.type = "button"
      nameButton.className = "student-name"
      nameButton.textContent = student.name
      nameButton.title = "클릭해서 이름 수정"
      nameButton.addEventListener("click", () => updateStudent(student))

      seat.appendChild(number)
      seat.appendChild(nameButton)
      seat.appendChild(makeDeleteButton(student))
      return seat
    }

    function createEmptySeat(slotIndex) {
      const seat = document.createElement("article")
      seat.className = "empty-seat"
      setGridPosition(seat, slotIndex)

      const number = document.createElement("span")
      number.className = "seat-number"
      number.textContent = `${slotIndex + 1}번 자리`

      const emptyText = document.createElement("strong")
      emptyText.textContent = "빈자리"

      seat.appendChild(number)
      seat.appendChild(emptyText)
      return seat
    }

    function renderStudents(students) {
      classroom.replaceChildren()
      missingStudentsBox.replaceChildren()
      extrasBox.replaceChildren()

      const { extras, missingNames } = compareStudents(students)
      const duplicateIds = findDuplicateIds(students)
      const extraStudents = new Set(extras)
      const slots = Array(24).fill(null)
      const usedStudents = new Set()

      // 서버 배열 순서와 상관없이 지정된 학생을 기본 자리로 배치합니다.
      DEFAULT_SEAT_NAMES.forEach((name, index) => {
        const student = students.find(item =>
          !usedStudents.has(item) &&
          String(item.name || "").trim() === name
        )

        if (student) {
          slots[NORMAL_SEAT_SLOTS[index]] = student
          usedStudents.add(student)
        }
      })

      // 잘못되었거나 중복된 이름은 1·6·16·19번 빈자리에 표시합니다.
      extras.slice(0, 4).forEach((student, index) => {
        slots[EXTRA_SEAT_SLOTS[index]] = student
      })

      slots.forEach((student, slotIndex) => {
        if (student) {
          classroom.appendChild(
            createStudentSeat(student, slotIndex, extraStudents.has(student))
          )
        } else {
          classroom.appendChild(createEmptySeat(slotIndex))
        }
      })

      missingNames.forEach(name => {
        const item = document.createElement("div")
        item.className = "missing-card"
        item.textContent = name
        missingStudentsBox.appendChild(item)
      })

      missingCount.textContent = missingNames.length
      missingSection.style.display = missingNames.length ? "block" : "none"

      extras.forEach(student => {
        const card = document.createElement("article")
        card.className = "extra-card"

        const name = document.createElement("button")
        name.type = "button"
        name.className = "student-name"
        name.textContent = `${student.name} (ID: ${student.id})`
        name.title = "클릭해서 이름 수정"
        name.addEventListener("click", () => updateStudent(student))

        card.appendChild(name)
        card.appendChild(makeDeleteButton(student))
        extrasBox.appendChild(card)
      })

      extraSection.style.display = extras.length ? "block" : "none"

      showStatus(
        `서버 ${students.length}명 · 정상 ${20 - missingNames.length}명 · ` +
        `누락 ${missingNames.length}명 · 정리 대상 ${extras.length}명 · ` +
        `중복 ID ${duplicateIds.length}개`
      )
    }

    async function loadStudents() {
      showStatus("학생 데이터를 불러오는 중입니다.")

      try {
        const response = await fetch(API, {
          method: "GET",
          headers: AUTH_HEADERS,
          cache: "no-store"
        })

        currentStudents = await readJson(response)

        if (!Array.isArray(currentStudents)) {
          throw new Error("학생 배열 형식이 아닙니다.")
        }

        renderStudents(currentStudents)
      } catch (error) {
        showStatus(`조회 실패: ${error.message}`, true)
      }
    }

    async function addStudent() {
      const name = newNameInput.value.trim()

      if (!name) {
        alert("추가할 학생 이름을 입력하세요.")
        newNameInput.focus()
        return
      }

      try {
        showStatus(`${name} 학생을 추가하는 중입니다.`)

        const response = await fetch(API, {
          method: "POST",
          headers: JSON_HEADERS,
          body: JSON.stringify({ name })
        })

        await readJson(response)
        newNameInput.value = ""
        await loadStudents()
      } catch (error) {
        showStatus(`추가 실패: ${error.message}`, true)
      }
    }

    async function updateStudent(student) {
      const sameIdStudents = currentStudents.filter(item =>
        String(item.id) === String(student.id)
      )

      if (sameIdStudents.length > 1) {
        alert(
          `ID ${student.id}을(를) ${sameIdStudents.length}명이 함께 사용 중이라 ` +
          `정확한 PUT 수정이 불가능합니다.\n` +
          `먼저 '명단 한 번에 정리'로 중복 ID를 복구하세요.`
        )
        return
      }

      const newName = prompt("새 이름을 입력하세요.", student.name)

      if (newName === null) return
      if (!newName.trim()) {
        alert("이름은 빈칸일 수 없습니다.")
        return
      }
      const cleanNewName = newName.trim()

      if (cleanNewName === student.name) return

      const duplicateName = currentStudents.some(item =>
        item !== student &&
        String(item.name || "").trim() === cleanNewName
      )

      if (duplicateName) {
        alert(
          `${cleanNewName} 학생은 이미 서버 명단에 있습니다.\n` +
          `중복 이름으로는 수정할 수 없습니다.`
        )
        return
      }

      try {
        showStatus(`${student.name} 학생을 수정하는 중입니다.`)

        const response = await fetch(`${API}/${student.id}`, {
          method: "PUT",
          headers: JSON_HEADERS,
          body: JSON.stringify({ name: cleanNewName })
        })

        await readJson(response)
        await loadStudents()
      } catch (error) {
        showStatus(`수정 실패: ${error.message}`, true)
      }
    }

    async function deleteStudent(student, clickedButton) {
      if (!confirm(`${student.name} 학생을 정말 삭제할까요?`)) return

      clickedButton.disabled = true

      try {
        showStatus(`${student.name} 학생을 삭제하는 중입니다.`)

        const response = await fetch(`${API}/${student.id}`, {
          method: "DELETE",
          headers: AUTH_HEADERS
        })

        await readJson(response)
        await loadStudents()
      } catch (error) {
        showStatus(`삭제 실패: ${error.message}`, true)
        clickedButton.disabled = false
      }
    }

    async function normalizeRoster() {
      const firstCheck = compareStudents(currentStudents)
      const duplicateIds = findDuplicateIds(currentStudents)

      if (duplicateIds.length > 0) {
        const ok = confirm(
          `중복 ID가 ${duplicateIds.length}개 발견되었습니다.\n` +
          `이 상태에서는 PUT과 DELETE가 다른 학생에게 적용될 수 있습니다.\n\n` +
          `서버 명단을 모두 삭제한 뒤 정상 20명으로 다시 만들까요?`
        )

        if (!ok) return
        await rebuildRoster()
        return
      }

      if (!firstCheck.extras.length && !firstCheck.missingNames.length) {
        alert("이미 정상 명단 20명과 일치합니다.")
        return
      }

      const message =
        `정리 대상 ${firstCheck.extras.length}명을 삭제하고 ` +
        `누락된 ${firstCheck.missingNames.length}명을 추가할까요?`

      if (!confirm(message)) return

      cleanButton.disabled = true
      let deletedCount = 0
      let addedCount = 0
      const failures = []

      try {
        // 삭제 후 ID가 바뀔 수 있으므로 매번 최신 명단을 조회합니다.
        for (let pass = 0; pass < 50; pass++) {
          const listResponse = await fetch(API, {
            method: "GET",
            headers: AUTH_HEADERS,
            cache: "no-store"
          })
          const latestStudents = await readJson(listResponse)
          const latestExtras = compareStudents(latestStudents).extras

          if (latestExtras.length === 0) break

          const student = latestExtras[0]
          showStatus(
            `${student.name} 삭제 중 · 남은 정리 대상 ${latestExtras.length}명`
          )

          try {
            const response = await fetch(`${API}/${student.id}`, {
              method: "DELETE",
              headers: AUTH_HEADERS
            })
            await readJson(response)
            deletedCount++
          } catch (error) {
            failures.push(`${student.name} 삭제 실패: ${error.message}`)
            break
          }
        }

        // 삭제 완료 후 누락된 정상 명단을 다시 계산합니다.
        const afterDeleteResponse = await fetch(API, {
          method: "GET",
          headers: AUTH_HEADERS,
          cache: "no-store"
        })
        const afterDeleteStudents = await readJson(afterDeleteResponse)
        const namesToAdd = compareStudents(afterDeleteStudents).missingNames

        for (const name of namesToAdd) {
          showStatus(`${name} 학생을 복구하는 중입니다.`)

          try {
            const response = await fetch(API, {
              method: "POST",
              headers: JSON_HEADERS,
              body: JSON.stringify({ name })
            })
            await readJson(response)
            addedCount++
          } catch (error) {
            failures.push(`${name} 추가 실패: ${error.message}`)
          }
        }

        await loadStudents()
        const finalCheck = compareStudents(currentStudents)
        const completed =
          finalCheck.extras.length === 0 &&
          finalCheck.missingNames.length === 0

        const result =
          `삭제 ${deletedCount}명 · 추가 ${addedCount}명\n` +
          `남은 정리 대상 ${finalCheck.extras.length}명 · ` +
          `남은 누락 ${finalCheck.missingNames.length}명`

        if (completed) {
          alert(`명단 정리가 완료되었습니다.\n${result}`)
        } else {
          showStatus(
            `일부 작업 실패 · 정리 대상 ${finalCheck.extras.length}명 · ` +
            `누락 ${finalCheck.missingNames.length}명`,
            true
          )
          alert(`${result}\n\n${failures.join("\n")}`)
        }
      } catch (error) {
        showStatus(`명단 정리 실패: ${error.message}`, true)
      } finally {
        cleanButton.disabled = false
      }
    }

    async function rebuildRoster() {
      cleanButton.disabled = true
      let deleteRequests = 0
      let addedCount = 0

      try {
        showStatus("중복 ID 복구를 위해 기존 명단을 비우는 중입니다.")

        // 중복 ID가 있어도 매번 최신 첫 학생을 조회해 삭제하면 모두 비울 수 있습니다.
        for (let pass = 0; pass < 100; pass++) {
          const listResponse = await fetch(API, {
            method: "GET",
            headers: AUTH_HEADERS,
            cache: "no-store"
          })
          const latestStudents = await readJson(listResponse)

          if (!latestStudents.length) break

          const student = latestStudents[0]
          showStatus(
            `기존 명단 삭제 중 · 서버에 ${latestStudents.length}명 남음`
          )

          const deleteResponse = await fetch(`${API}/${student.id}`, {
            method: "DELETE",
            headers: AUTH_HEADERS
          })
          await readJson(deleteResponse)
          deleteRequests++
        }

        const emptyCheckResponse = await fetch(API, {
          method: "GET",
          headers: AUTH_HEADERS,
          cache: "no-store"
        })
        const remainingStudents = await readJson(emptyCheckResponse)

        if (remainingStudents.length > 0) {
          throw new Error(`기존 학생 ${remainingStudents.length}명이 남아 있습니다.`)
        }

        for (const name of DEFAULT_SEAT_NAMES) {
          showStatus(`${name} 학생을 정상 명단에 추가하는 중입니다.`)

          const response = await fetch(API, {
            method: "POST",
            headers: JSON_HEADERS,
            body: JSON.stringify({ name })
          })
          await readJson(response)
          addedCount++
        }

        await loadStudents()

        const finalCheck = compareStudents(currentStudents)
        const finalDuplicateIds = findDuplicateIds(currentStudents)
        const completed =
          currentStudents.length === 20 &&
          finalCheck.extras.length === 0 &&
          finalCheck.missingNames.length === 0 &&
          finalDuplicateIds.length === 0

        if (!completed) {
          throw new Error(
            `복구 후 서버 ${currentStudents.length}명 · ` +
            `누락 ${finalCheck.missingNames.length}명 · ` +
            `중복 ID ${finalDuplicateIds.length}개`
          )
        }

        alert(
          `중복 ID 복구가 완료되었습니다.\n` +
          `DELETE 요청 ${deleteRequests}회 · POST ${addedCount}명\n` +
          `이제 이름 클릭 PUT 수정이 정상 동작합니다.`
        )
      } catch (error) {
        showStatus(`중복 ID 복구 실패: ${error.message}`, true)
        alert(`중복 ID 복구 중 오류가 발생했습니다.\n${error.message}`)
        await loadStudents()
      } finally {
        cleanButton.disabled = false
      }
    }

    addButton.addEventListener("click", addStudent)
    cleanButton.addEventListener("click", normalizeRoster)
    reloadButton.addEventListener("click", loadStudents)

    newNameInput.addEventListener("keydown", event => {
      if (event.key === "Enter") addStudent()
    })

    loadStudents()
  </script>
</body>
</html>
