<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>
            Class
        </title>
    </head>

    <body>
        <h1>Class</h1>
        <p class="note1">우와우와 오늘은 성적 발표날!!</p>
        <p class="note2">과연 두근두근 둥글게</p>

    </body>
</html>

<!-- class = 이름표,, css 디자인할때 사용됨

class="note" = 두 문단에 같은 이름표를 단 것 — 나중에 CSS로 note 하나만 꾸미면 둘 다 같이 바뀜 -->
