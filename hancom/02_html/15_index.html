<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF_8">
        <title>폼 . 입력</title>
    </head>

    <body>
        <!--form 입력 칸들을 묶는 상자-->
        <form>
            <!--label : 설명 글자, input 글자 칸-->
            <label>이름 : <input type="text" placeholder="이름입력" ></label>
            <br>
            <hr>
            <label>목표 : <input type="number" placeholder="능력 목표치 1~10"></label>
            <br>
            <hr>
            <label>계획 기간 : <input type="datetime" placeholder="기간 설정"></label>
            <br>
            <hr>
            <label>동기 : <input type="text" placeholder="목표 동기"></label>
            <br>
            <hr>
            <label>색상 : <input type="color" placeholder="대표색"></label>
            <br>
            <br>
            <br>
            <button type="submit">
                보내기
            </button>

        </form>

    </body>


</html>
