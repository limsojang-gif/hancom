<!DOCTYPE html>
<html lang="ko">
<head> <!--화면에는 보이지 않는 설정 데이터 준비 칸-->

    <meta charset="UTF_8">
    <title>제목과 문단</title>
    
</head>

<body> <!--화면에 보이는 테그=요소를 적는 몸통 칸 = 바디 -->

    <h1> h1 : 제일 큰 글자 </h1>
    <h2> h2 : 제일 큰 글자 </h2>
    <h3> h3 : 제일 큰 글자 </h3>
    <h4> h4 : 제일 큰 글자 </h4>
    <h5> h5 : 제일 큰 글자 </h5>
    <h6> h6 : 제일 큰 글자 </h6> <!--h6 가지만 글자 싸이즈 테크로 조절 가능-->

    <!-- p : 문단 (글의 한덩어리)// 본문 덩어리-->
    <p> p 는 문단 // 본문 덩이리 </p>

</body>
    
</html>
