<!DOCTYPE html>
<html lang="ko">
    <head>

        <Meta charset="UTF_8">
        <title>이미지 넣기</title> <!--브라우저 탭에 뜨는 이름-->

    </head>

    <body> <!--화면에 보이는 몸통 칸-->
        <!---img  는 닫는 테그 없음 /  src에는 사진 주소 / ALT 사진 안 뜰때 대신 보이는 글자-->
        <img src="https://picsum.photos/300/200" alt="예시 사진" />
        <br>
        <img src="../02_html/image.jpg" width="300" height="200" alt="예시 사진" />
        <!-- copy relactive path--로 저장한 이미지 경로 복사 -> IMG SRC="../복사한 이미지경로"-->
    </body>
       
</html>
