<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF_8">
        <title>줄 및 선</title>
    </head>

    <body>
        <!--br 문단 안에서 줄바꾸기 닫는 태그 없음-->
        <p>첫째 줄 <br> 둘째 줄</p>
        <!--hr 내용을 나누는 가로 줄 (닫는 태그 없음)-->
        <hr>
        <p>첫째 줄 <br> 둘째 줄</p>
        <hr>

    </body>
    
</html>
