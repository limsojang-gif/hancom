<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>span</title>
    </head>

    <body>
        <h1>Span 인라인 상자</h1>
        <p>글자 중 <span class="good">여기만 </span>강조</p>

    </body>
</html>

<!-- <span>여기만</span> = 문장 속 글자 일부만 따로 묶는 인라인 상자 — 줄을 바꾸지 않고 글자 사이에 끼어듦 
 HTML <span> 요소는 구문 콘텐츠를 위한 통용 인라인 컨테이너로, 본질적으로는 아무것도 나타내지 않습니다. 
스타일을 적용하기 위해서, 또는 lang 등 어떤 특성의 값을 서로 공유하는 요소를 묶을 때 사용할 수 있습니다. -->
