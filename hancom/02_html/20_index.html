<!DOCTYPE html>
<html lang="ko">

    <head>
        <meta charset="UTF-8">
        <title>div</title>
    </head>

    <body>
        <h1>div</h1>
        <div class="card">
            <img src="../02_html/img2.jpg"width="300" height="500">
            <h3>여행 상품</h3>
            <p>가격 5,000,000</p>
            <img src="../02_html/img3.jpg"width="300" height="400">
        </div>


    </body>
</html>

<!-- div — 만능 블록 상자 (한 줄 통째)
뜻 없는 빈 상자 — 여러 요소를 묶어서 한꺼번에 꾸밀 때 사용

<div class="card"> = 사진·이름·가격 3개를 한 상자로 묶음 
— 나중에 CSS로 card에 테두리·그림자를 한 번 주면 3개가 통째로 카드 모양이 됨 -->
