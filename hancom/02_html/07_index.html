<!DOCTYPE html>
<html lang="ko"> <!-- 문서 시작 하겠다 html 언어 설정은 한국어 ko-->

    <head> <!-- 화면에 보이지 않는 페이지의 특성 값 설정-->
        <meta charset="UTF_8">
        <title>강조와 중첩</title>
    </head>

    <body> <!--여기에 요소 = 테그를 달면 화면에 보임 바디는 화면에 몸통-->

        <!--태그 안에 태그를 넣은 구조 = 중첩 -->
         <!--중첩 : 태그 안에 태그 넣기 strong은 글자를 굵게 강조-->
        <p>
            저는 <strong>임소정</strong>입니다. 개발은 초보입니다.
            &lt; 꺽쇠는 별도의 태그 필요 &gt; 
            &amp; 이것도 별도의 태그 필요 
            
        </p>

    </body>

</html> <!--문서 끝-->
