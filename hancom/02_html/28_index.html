<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>시멘틱 구조</title>
    </head>

    <body>
        <header>
            <h1> 시멘틱 구조</h1>
            <nav> 홈 | 소개 |연락처</nav>
        </header>

        <main>
            <section> <!--주제 덩어리-->
            
                <article> <!--완결된 글 하나-->
                    첫 번째 글 내용
                </article>
            </section>
        </main>

        <aside> <!--본문옆 보조 내용 rux-->
            곁다리 정보 (사이드바)
        </aside>

        <footer>
            2026 내 사이트
        </footer>

    </body>
</html>

<!--
div 는 뜻 없는 빈 상자
시멘틱 테그는 이름만 봐도 무슨 구역인지 드러남
핵심 : header, navm ,main, section, aside, footer
• <nav> = 메뉴·길 안내 모음
• <section> = 한 주제로 묶인 덩어리
• <article> = 그 자체로 완결된 글(글·뉴스·카드)
• <aside> = 본문 곁다리(사이드바·광고)-->
