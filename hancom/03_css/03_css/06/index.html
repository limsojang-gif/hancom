<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css 붙이는 3가지 방법 (외부|내부|인라인)</title>
    <link rel="stylesheet" href="styles/main.css" /> <!-- 1.외부 -->
    <!--2. 내부-->

        p {color: green;}
    </style>

    <h1>외부 스타일로 노란색</h1>
    <p>내부 스타일로 초록색 지정</p>
    <p style="color: red;">인라인으로 빨강</p>
    
</body>
</html>
