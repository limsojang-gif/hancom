<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계산기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e1e2f, #2d2d44);
    font-family: system-ui, "Segoe UI", sans-serif;
    padding: 16px;
  }
  .calc {
    width: 320px;
    max-width: 100%;
    background: #1c1c28;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,.5);
  }
  .display {
    background: #12121a;
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 16px;
    text-align: right;
    color: #fff;
    overflow: hidden;
  }
  .display .history {
    font-size: 14px;
    color: #7a7a90;
    min-height: 18px;
    white-space: nowrap;
  }
  .display .current {
    font-size: 40px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  button {
    border: none;
    border-radius: 14px;
    padding: 18px 0;
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    background: #33334a;
    cursor: pointer;
    transition: filter .12s, transform .05s;
  }
  button:hover { filter: brightness(1.15); }
  button:active { transform: scale(.95); }
  button.func { background: #44445f; color: #ffd479; }
  button.op { background: #ff9f0a; }
  button.equals { background: #2ec16b; }
  button.span2 { grid-column: span 2; }
</style>
</head>
<body>
  <div class="calc">
    <div class="display">
      <div class="history" id="history"></div>
      <div class="current" id="current">0</div>
    </div>
    <div class="grid">
      <button class="func" data-action="clear">C</button>
      <button class="func" data-action="sign">±</button>
      <button class="func" data-action="percent">%</button>
      <button class="op" data-op="/">÷</button>

      <button data-digit="7">7</button>
      <button data-digit="8">8</button>
      <button data-digit="9">9</button>
      <button class="op" data-op="*">×</button>

      <button data-digit="4">4</button>
      <button data-digit="5">5</button>
      <button data-digit="6">6</button>
      <button class="op" data-op="-">−</button>

      <button data-digit="1">1</button>
      <button data-digit="2">2</button>
      <button data-digit="3">3</button>
      <button class="op" data-op="+">+</button>

      <button class="span2" data-digit="0">0</button>
      <button data-action="decimal">.</button>
      <button class="equals" data-action="equals">=</button>
    </div>
  </div>

<script>
  const currentEl = document.getElementById('current');
  const historyEl = document.getElementById('history');

  let current = '0';   // 현재 입력 문자열
  let previous = null; // 이전 값 (숫자)
  let operator = null; // 선택된 연산자
  let justCalculated = false; // 방금 = 눌렀는지

  const opSymbol = { '+': '+', '-': '−', '*': '×', '/': '÷' };

  function render() {
    currentEl.textContent = current;
    historyEl.textContent =
      previous !== null && operator ? `${formatNum(previous)} ${opSymbol[operator]}` : '';
  }

  function formatNum(n) {
    // 부동소수 오차 정리 후 표시
    const rounded = Math.round(n * 1e12) / 1e12;
    return String(rounded);
  }

  function inputDigit(d) {
    if (justCalculated) { current = '0'; justCalculated = false; }
    current = current === '0' ? d : current + d;
    render();
  }

  function inputDecimal() {
    if (justCalculated) { current = '0'; justCalculated = false; }
    if (!current.includes('.')) current += '.';
    render();
  }

  function chooseOperator(op) {
    if (operator && previous !== null && !justCalculated) {
      compute();
    } else {
      previous = parseFloat(current);
    }
    operator = op;
    justCalculated = false;
    current = '0';
    // history를 위해 render (current는 0으로 표시되지만 곧 새 입력)
    historyEl.textContent = `${formatNum(previous)} ${opSymbol[op]}`;
    currentEl.textContent = formatNum(previous);
  }

  function compute() {
    if (operator === null || previous === null) return;
    const a = previous;
    const b = parseFloat(current);
    let result;
    switch (operator) {
      case '+': result = a + b; break;
      case '-': result = a - b; break;
      case '*': result = a * b; break;
      case '/':
        if (b === 0) { showError(); return; }
        result = a / b; break;
    }
    current = formatNum(result);
    previous = result;
  }

  function calculate() {
    if (operator === null || previous === null) return;
    const expr = `${formatNum(previous)} ${opSymbol[operator]} ${current} =`;
    compute();
    if (current === 'Error') return;
    historyEl.textContent = expr;
    currentEl.textContent = current;
    operator = null;
    previous = null;
    justCalculated = true;
  }

  function showError() {
    current = 'Error';
    previous = null;
    operator = null;
    justCalculated = true;
    currentEl.textContent = 'Error';
    historyEl.textContent = '0으로 나눌 수 없습니다';
  }

  function clearAll() {
    current = '0'; previous = null; operator = null; justCalculated = false;
    render();
  }

  function backspace() {
    if (justCalculated) { clearAll(); return; }
    current = current.length > 1 ? current.slice(0, -1) : '0';
    render();
  }

  function toggleSign() {
    if (current === '0' || current === 'Error') return;
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
    render();
  }

  function percent() {
    current = formatNum(parseFloat(current) / 100);
    render();
  }

  // 버튼 클릭
  document.querySelector('.grid').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    if (current === 'Error' && !btn.dataset.action) clearAll();

    if (btn.dataset.digit !== undefined) inputDigit(btn.dataset.digit);
    else if (btn.dataset.op) chooseOperator(btn.dataset.op);
    else switch (btn.dataset.action) {
      case 'clear': clearAll(); break;
      case 'sign': toggleSign(); break;
      case 'percent': percent(); break;
      case 'decimal': inputDecimal(); break;
      case 'equals': calculate(); break;
    }
  });

  // 키보드 입력
  document.addEventListener('keydown', (e) => {
    const k = e.key;
    if (current === 'Error' && k !== 'Escape') clearAll();
    if (/[0-9]/.test(k)) inputDigit(k);
    else if (k === '.') inputDecimal();
    else if (['+', '-', '*', '/'].includes(k)) chooseOperator(k);
    else if (k === 'Enter' || k === '=') { e.preventDefault(); calculate(); }
    else if (k === 'Escape') clearAll();
    else if (k === 'Backspace') backspace();
    else if (k === '%') percent();
  });

  render();
</script>
</body>
</html>
